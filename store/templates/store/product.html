{% extends 'store/base.html' %}
{% block title %}
  Products
{% endblock %}
{% block content %}
  <div class="container mt-4">
    <div class="row">
      {% for product in products %}
        <div class="col-md-4 col-sm-6 mb-4">
          <div class="card h-100">
            <img src="{{ product.image.url }}" class="img-fluid" alt="image" style="height:250px; object-fit:contain;" />

            <div class="card-body text-center">
              <h5 class="card-title">{{ product.name }}</h5>
              <h6 class="text-success">₹ {{ product.price }}</h6>

              <a href="{% url 'product_detail' product.pk %}" class="btn btn-primary btn-sm">View</a>
            </div>
          </div>
        </div>
      {% endfor %}
    </div>
  </div>
{% endblock %}
